<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Hugo's hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:linear-gradient(145deg,#0f0f0f,#1a1a1a);
  font-family:Arial,sans-serif;
  overflow:hidden;
}

/* MENU */
.menu{
  position:fixed;
  top:15px;
  right:15px;
  display:flex;
  gap:4px;
  padding:4px;
  background:rgba(30,30,30,.6);
  backdrop-filter:blur(25px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,.06);
  z-index:9999;
}
.link{
  position:relative;
  width:42px;
  height:42px;
  border-radius:16px;
  text-decoration:none;
  color:#d4d4d8;
  overflow:hidden;
  transition:.3s;
}
.link .icon,.link .label{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  transition:.3s;
}
.link .icon{
  left:50%;
  transform:translate(-50%,-50%);
}
.link .label{
  left:44px;
  opacity:0;
  white-space:nowrap;
  font-size:13px;
}
.link:hover{
  width:110px;
  background:rgba(255,255,255,.08);
}
.link:hover .icon{
  left:22px;
}
.link:hover .label{
  opacity:1;
}

/* CONTAINER */
.game-container{
  height:100vh;
  display:flex;
  align-items:center;
  padding-left:40px;
}

/* CAIXA DO JOGO */
.game-box{
  width:65%;
  height:88vh;
  background:rgba(30,30,30,.55);
  backdrop-filter:blur(12px);
  border-radius:25px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 20px 60px rgba(0,0,0,.8);
  display:flex;
  flex-direction:column;
}

/* IFRAME */
.game-frame{
  flex:1;
  width:100%;
  border:none;
  background:black;
}

/* BARRA INFERIOR */
.game-info{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px;
  background:rgba(20,20,20,.9);
  border-top:1px solid rgba(255,255,255,.08);
}

.game-info-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.game-info img{
  width:90px;
  height:60px;
  object-fit:cover;
  border-radius:10px;
}

.game-title{
  color:#e4e4e7;
  font-size:20px;
  font-weight:bold;
}

/* BOTÕES FULLSCREEN E FAVORITO */
.button-group{
  display:flex;
  align-items:center;
  gap:15px; /* distância entre os botões */
}

.fullscreen-btn{
  background:rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.15);
  color:white;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  font-size:18px;
  backdrop-filter:blur(10px);
  transition:.2s;
}
.fullscreen-btn:hover{
  background:rgba(255,255,255,.2);
}

.favorite-btn{
  background:rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.15);
  color:white;
  border-radius:10px;
  padding:6px 10px;       /* menor que fullscreen */
  font-size:16px;          /* menor que fullscreen */
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:.2s;
}
.favorite-btn:hover{
  background:rgba(255,255,255,.2);
}
.favorite-btn.favorited{
  color:#f87171; /* vermelho quando favoritado */
}
</style>
</head>

<body>

<div class="menu">
  <a href="https://pax0102.github.io/Inicio/" class="link active">
    <div class="icon">🏠</div>
    <div class="label">Inicio</div>
  </a>
  <a href="#" class="link">
    <div class="icon">🔍</div>
    <div class="label">Procurar</div>
  </a>
  <a href="#" class="link">
    <div class="icon">❤️</div>
    <div class="label">Favoritos</div>
  </a>
  <a href="#" class="link">
    <div class="icon">⚙️</div>
    <div class="label">Config</div>
  </a>
</div>

<div class="game-container">
  <div class="game-box">

    <iframe 
      id="gameFrame"
      class="game-frame"
      src="LINK_DO_JOGO_AQUI"
      allowfullscreen>
    </iframe>

    <div class="game-info">
      <div class="game-info-left">
        <img src="https://cdn.jsdelivr.net/gh/mathlesson/mathlesson.github.io/img/ragdoll-archers.jpg">
        <div class="game-title">Ragdoll Archers</div>
      </div>
      
      <div class="button-group">
        <button class="favorite-btn" id="favoriteBtn" onclick="toggleFavorite()">❤️</button>
        <button class="fullscreen-btn" onclick="fullscreenGame()">⛶</button>
      </div>
      
    </div>

  </div>
</div>

<script>
function fullscreenGame(){
  let iframe = document.getElementById("gameFrame");
  if(iframe.requestFullscreen){
    iframe.requestFullscreen();
  } else if(iframe.webkitRequestFullscreen){
    iframe.webkitRequestFullscreen();
  } else if(iframe.msRequestFullscreen){
    iframe.msRequestFullscreen();
  }
}

function toggleFavorite(){
  const btn = document.getElementById("favoriteBtn");
  btn.classList.toggle("favorited");
}
</script>

</body>
</html>
