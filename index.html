<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Hugo's hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;background:linear-gradient(145deg,#0f0f0f,#1a1a1a);font-family:Arial,sans-serif}

.menu{position:fixed;top:15px;right:15px;display:flex;gap:4px;padding:4px;background:rgba(30,30,30,.6);backdrop-filter:blur(25px);border-radius:20px;border:1px solid rgba(255,255,255,.06);z-index:9999}

.link{position:relative;width:42px;height:42px;border-radius:16px;text-decoration:none;color:#d4d4d8;overflow:hidden;transition:.3s}
.link .icon,.link .label{position:absolute;top:50%;transform:translateY(-50%);transition:.3s}
.link .icon{left:50%;transform:translate(-50%,-50%)}
.link .label{left:44px;opacity:0;white-space:nowrap;font-size:13px}

.link:hover{width:110px}
.link:hover{background:rgba(255,255,255,.08)}

.link:hover .icon{left:22px}
.link:hover .label{opacity:1}

.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:30px;padding:40px;max-width:1400px;margin:auto}

.card-link{text-decoration:none;color:inherit}

.card{width:100%;height:300px;background:rgba(30,30,30,.55);backdrop-filter:blur(12px);border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:0 10px 35px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05);transition:.3s}
.card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,.8),0 0 20px rgba(59,130,246,.25)}

.card img{width:100%;height:120px;object-fit:cover}
.card-content{padding:20px;color:#e4e4e7}

.separator{display:flex;align-items:center;text-align:center;margin:20px 0;color:#9ca3af;font-size:14px}
.separator:before,.separator:after{content:"";flex:1;border-bottom:1px solid rgba(255,255,255,.2)}
.separator:before{margin-right:10px}
.separator:after{margin-left:10px}
</style>
</head>

<body>

<div class="menu">
<a href="https://pax0102.github.io/Inicio/" class="link active"><div class="icon">🏠</div><div class="label">Inicio</div></a> <!-- deixe o href aqui como "#" -->
<a href="#" class="link"><div class="icon">🔍</div><div class="label">Procurar</div></a>
<a href="#" class="link"><div class="icon">❤️</div><div class="label">Favoritos</div></a>
<a href="#" class="link"><div class="icon">⚙️</div><div class="label">Config</div></a>
</div>

<div class="cards">
<a href="#" class="card-link"><div class="card">  <!-- mudar link aqui -->
<img src="https://cdn.jsdelivr.net/gh/mathlesson/mathlesson.github.io/img/ragdoll-archers.jpg">
<div class="card-content"><h2>Ragdoll Archers</h2><div class="separator">Informações</div><p>Ragdoll Archers, Arqueiro, Demorado, Evolutivo</p></div>
</div></a>
</div>

</body>
</html>
